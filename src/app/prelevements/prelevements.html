<div class="page-wrapper">
  <div class="container py-4">

    <div class="page-header">
      <div class="header-icon"><i class="bi bi-droplet"></i></div>
      <div>
        <h3 class="page-title">Enregistrer un prélèvement</h3>
        <p class="page-subtitle">Sélectionnez une analyse et renseignez le type de prélèvement</p>
      </div>
    </div>

    <!-- Message -->
    <div *ngIf="message" class="alert-custom"
         [class.alert-success-custom]="message.includes('✅') || message.includes('succès')"
         [class.alert-error-custom]="!message.includes('✅') && !message.includes('succès')">
      <i class="bi" [class.bi-check-circle-fill]="message.includes('✅') || message.includes('succès')"
         [class.bi-info-circle-fill]="!message.includes('✅') && !message.includes('succès')"></i>
      {{ message }}
    </div>

    <div class="form-card">
      <form>
        <!-- Sélection analyse -->
        <div class="input-group-custom">
          <label class="input-label">
            <i class="bi bi-file-earmark-medical"></i> Sélectionner une analyse
          </label>
          <select class="input-field select-field" [(ngModel)]="selectedAnalyseId" name="analyse" required>
            <option [ngValue]="null">-- Choisir une analyse --</option>
            <option *ngFor="let analyse of analyses" [value]="analyse.id">
              Analyse #{{ analyse.id }} - {{ analyse.description || 'Pas de description' }}
              (Patient ID: {{ analyse.patientId }})
            </option>
          </select>
        </div>

        <!-- Type prélèvement -->
        <div class="input-group-custom">
          <label class="input-label">
            <i class="bi bi-eyedropper"></i> Type de prélèvement
          </label>
          <input type="text" class="input-field" placeholder="ex: sang, urine..." [(ngModel)]="typePrelevement" name="typePrelevement">
        </div>

        <!-- Bouton -->
        <button class="btn-submit" type="button" (click)="enregistrer()">
          <i class="bi bi-floppy2-fill"></i>
          Enregistrer
        </button>
      </form>
    </div>

  </div>
</div>
