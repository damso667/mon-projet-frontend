<!-- Login Page — Enhanced Design -->
<div class="login-page">

  <!-- Panneau gauche décoratif -->
  <div class="login-side">
    <div class="side-content">
      <div class="side-logo">
        <i class="bi bi-activity"></i>
      </div>
      <h2>Bienvenue</h2>
      <p>Plateforme de gestion des analyses médicales — sécurisée, rapide et fiable.</p>
      <div class="side-features">
        <div class="feature-item">
          <i class="bi bi-shield-check"></i>
          <span>Session sécurisée</span>
        </div>
        <div class="feature-item">
          <i class="bi bi-clock-history"></i>
          <span>Accès 24/7</span>
        </div>
        <div class="feature-item">
          <i class="bi bi-people"></i>
          <span>Multi-rôles</span>
        </div>
      </div>
    </div>
    <!-- Bulles décoratives -->
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
  </div>

  <!-- Panneau droit : formulaire -->
  <div class="login-form-panel">
    <div class="login-card">
      <div class="card-header-custom">
        <div class="header-icon">
          <i class="bi bi-person-circle"></i>
        </div>
        <h4>Connexion</h4>
        <p class="text-muted">Entrez vos identifiants pour accéder à votre espace</p>
      </div>

      <!-- Message d'erreur -->
      <div *ngIf="message" class="alert-custom">
        <i class="bi bi-exclamation-triangle-fill"></i>
        {{ message }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
        <!-- Email -->
        <div class="input-group-custom">
          <label class="input-label" for="email">
            <i class="bi bi-envelope"></i> Email
          </label>
          <input
            class="input-field"
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="votre@email.com"
            autocomplete="email"
          >
        </div>

        <!-- Mot de passe -->
        <div class="input-group-custom">
          <label class="input-label" for="password">
            <i class="bi bi-lock"></i> Mot de passe
          </label>
          <input
            class="input-field"
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••"
            autocomplete="current-password"
          >
        </div>

        <!-- Bouton -->
        <button
          class="btn-login"
          type="submit"
          [disabled]="loginForm.invalid || loading"
          [class.loading]="loading"
        >
          <span *ngIf="!loading" class="btn-text">
            Se connecter
            <i class="bi bi-arrow-right-short"></i>
          </span>
          <span *ngIf="loading" class="btn-text d-inline-flex align-items-center">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Connexion…
          </span>
        </button>
      </form>

      <div class="login-footer">
        <span class="text-muted">Laboratoire • Excellence & Fiabilité</span>
      </div>
    </div>
  </div>
</div>
