<div class="page-wrapper">
  <div class="container py-4">

    <div class="page-header">
      <div class="header-icon"><i class="bi bi-clipboard-data"></i></div>
      <div>
        <h3 class="page-title">Types d'examens</h3>
        <p class="page-subtitle">Catalogue des types d'examens disponibles</p>
      </div>
    </div>

    <div *ngIf="message" class="alert-custom alert-info-custom">
      <i class="bi bi-exclamation-triangle-fill"></i>
      {{ message }}
    </div>

    <!-- Barre de recherche -->
    <div class="search-bar">
      <i class="bi bi-search"></i>
      <input type="text" class="search-input" placeholder="Rechercher un type d'examen..." [(ngModel)]="searchTerm" (input)="applyFilter()">
    </div>

    <!-- Liste cards -->
    <div class="examen-grid">
      <div class="col" *ngFor="let t of filteredExamens; let i = index">
        <div class="examen-card fade-in-row" [style.animation-delay]="(i * 0.05) + 's'">
          <div class="examen-card-id">#{{ t.id }}</div>
          <h6 class="examen-card-name">{{ t.nom }}</h6>
          <p class="examen-card-desc">{{ t.description || '—' }}</p>
        </div>
      </div>
    </div>

    <!-- Aucun résultat -->
    <div *ngIf="filteredExamens.length === 0" class="empty-state">
      <div class="empty-icon"><i class="bi bi-search"></i></div>
      <h5>Aucun type d'examen trouvé</h5>
      <p>Essayez un autre terme de recherche.</p>
    </div>

  </div>
</div>
