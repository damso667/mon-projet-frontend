<!-- Dashboard — Enhanced Design -->
<div class="page-wrapper">
  <div class="container py-4">

    <div class="page-header text-center">
      <div class="header-icon mx-auto"><i class="bi bi-speedometer2"></i></div>
      <h3 class="page-title">Tableau de bord</h3>
      <p class="page-subtitle">{{ role }}</p>
    </div>

    <div class="actions-grid">
      <div *ngFor="let action of actions; let i = index" class="action-card fade-in-row" [style.animation-delay]="(i * 0.08) + 's'" (click)="goTo(action.route)">
        <div class="action-icon">
          <i [class]="action.icon"></i>
        </div>
        <h6>{{ action.title }}</h6>
      </div>
    </div>

  </div>
</div>
